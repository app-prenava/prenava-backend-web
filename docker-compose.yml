services:
  app:
    build:
      context: .
      dockerfile: docker/frankenphp.Dockerfile
    container_name: nuri-backend-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - prenava-public-data:/app/public
      - prenava-storage-data:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nuri-net
    ports:
      - "${APP_PORT:-80}:80"

  mysql:
    image: mysql:8.0
    container_name: nuri-backend-mysql
    hostname: mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nuri-net
    ports:
      - "3307:3306"
    command: --collation-server=utf8mb4_unicode_ci --character-set-server=utf8mb4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: nuri-backend-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    networks:
      - nuri-net
    volumes:
      - redis_data:/data

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: nuri-backend-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: ${DB_USERNAME:-nuri}
      PMA_PASSWORD: ${DB_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - nuri-net
    ports:
      - "8081:80"

volumes:
  mysql_data:
  redis_data:
  prenava-public-data:
  prenava-storage-data:

networks:
  nuri-net:
    driver: bridge
