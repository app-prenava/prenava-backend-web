services:
  app:
    build:
      context: .
      dockerfile: docker/frankenphp.Dockerfile
    container_name: nuri-backend-app
    restart: unless-stopped
    volumes:
      - ./:/app
    depends_on:
      - mysql
      - redis
    networks:
      - nuri-net
    ports:
      - "127.0.0.1:8000:80"
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: ${APP_KEY}
      APP_URL: http://localhost:8000

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nuri_db}
      DB_USERNAME: ${DB_USERNAME:-nuri}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_URL: "tcp://redis:6379"
      REDIS_DB: 0
      REDIS_CACHE_DB: 1


  mysql:
    image: mysql:8.0
    container_name: nuri-backend-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-nuri_db}
      MYSQL_USER: ${DB_USERNAME:-nuri}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - nuri-net
    ports:
      - "127.0.0.1:3307:3306"

  redis:
    image: redis:7-alpine
    container_name: nuri-backend-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - nuri-net
    volumes:
      - redis_data:/data

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: nuri-backend-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql
    networks:
      - nuri-net
    ports:
      - "127.0.0.1:8081:80"

volumes:
  mysql_data:
  redis_data:

networks:
  nuri-net:
    driver: bridge